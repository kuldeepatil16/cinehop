name: Scrape Cinema Showtimes

on:
  schedule:
    # Every 2 hours during cinema hours (08:00–22:00 CET = 07:00–21:00 UTC)
    - cron: '0 7,9,11,13,15,17,19,21 * * *'
  workflow_dispatch:
    inputs:
      chain:
        description: 'Which chain to scrape (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - cinesa
          - yelmo
          - kinepolis

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Chromium system deps (if cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run scrapers
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.chain }}" ]; then
            npm run scrape:${{ github.event.inputs.chain }}
          else
            npm run scrape
          fi

      - name: Report result
        if: always()
        run: echo "Scrape job completed with status ${{ job.status }}"
