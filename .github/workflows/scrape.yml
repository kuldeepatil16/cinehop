name: Scrape Cinema Showtimes

on:
  schedule:
    # Every 3 hours during cinema hours (07:00–22:00 CET = 06:00–21:00 UTC)
    - cron: '0 6,9,12,15,18,21 * * *'
  workflow_dispatch:
    inputs:
      chain:
        description: 'Which chain to scrape (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - cinesa
          - yelmo
          - kinepolis

# Shared step definition via YAML anchors
env:
  NODE_VERSION: '20'

jobs:
  # ─── Cinesa ───────────────────────────────────────────────────────────────
  scrape-cinesa:
    if: ${{ github.event.inputs.chain == '' || github.event.inputs.chain == 'cinesa' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - uses: actions/cache@v4
        id: pw-cache-cinesa
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.pw-cache-cinesa.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Chromium system deps (cache hit)
        if: steps.pw-cache-cinesa.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Scrape Cinesa
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
        run: npm run scrape:cinesa

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Cinesa scrape failed at $(date -u)"

  # ─── Yelmo ────────────────────────────────────────────────────────────────
  scrape-yelmo:
    if: ${{ github.event.inputs.chain == '' || github.event.inputs.chain == 'yelmo' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - uses: actions/cache@v4
        id: pw-cache-yelmo
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.pw-cache-yelmo.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Chromium system deps (cache hit)
        if: steps.pw-cache-yelmo.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Scrape Yelmo
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
        run: npm run scrape:yelmo

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Yelmo scrape failed at $(date -u)"

  # ─── Kinepolis ────────────────────────────────────────────────────────────
  scrape-kinepolis:
    if: ${{ github.event.inputs.chain == '' || github.event.inputs.chain == 'kinepolis' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - uses: actions/cache@v4
        id: pw-cache-kinepolis
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.pw-cache-kinepolis.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Chromium system deps (cache hit)
        if: steps.pw-cache-kinepolis.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Scrape Kinepolis
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          KINEPOLIS_HEADFUL: '1'
        run: xvfb-run -a npm run scrape:kinepolis

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Kinepolis scrape failed at $(date -u)"
